<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SoClip overlay</title>
<!--
  SoClip — shoutout clip overlay for OBS.

  Add this file as a Browser source (Local file) sized to your canvas
  (e.g. 1920x1080). It connects to Streamer.bot's WebSocket server and plays
  the clips that the "SoClip - Shoutout" action sends it.

  Settings live in config.js (same folder as this file) — edit that, not this.

    position  center | top | bottom | top-left | top-right | bottom-left | bottom-right   (default: center)
    width     card width in px, 240–1280                                                  (default: 480)
    volume    0.0 – 1.0                                                                   (default: 0.85)
    host      Streamer.bot WebSocket host                                                 (default: 127.0.0.1)
    port      Streamer.bot WebSocket port                                                 (default: 8080)
    password  only needed if the WebSocket server has Authentication enabled
    test      true = repeat a fake clip so you can position the card without firing chat

  The same names also work as URL query options (overlay.html?port=8990&test=1)
  and take priority over config.js. config.js is optional — without it the
  defaults above apply.
-->
<style>
  :root {
    --purple: #9146ff;
    --card-w: 480px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }

  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;        /* overridden by position classes */
    justify-content: center;
    padding: 40px;
    pointer-events: none;
  }
  #stage.top          { align-items: flex-start; }
  #stage.bottom       { align-items: flex-end; }
  #stage.top-left     { align-items: flex-start; justify-content: flex-start; }
  #stage.top-right    { align-items: flex-start; justify-content: flex-end; }
  #stage.bottom-left  { align-items: flex-end;   justify-content: flex-start; }
  #stage.bottom-right { align-items: flex-end;   justify-content: flex-end; }

  #card {
    width: var(--card-w);
    opacity: 0;
    transform: translateY(24px) scale(0.97);
    transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }
  #card.show { opacity: 1; transform: translateY(0) scale(1); }

  #frame {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    background: #0e0e10;
    box-shadow: 0 12px 40px rgba(0,0,0,0.55), 0 0 0 3px var(--purple);
  }
  #video { display: block; width: 100%; aspect-ratio: 16/9; object-fit: contain; background: #000; }

  #banner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #1f1530 0%, #18181b 60%);
    border-top: 2px solid var(--purple);
  }
  #avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid var(--purple);
    background: #26262c;
    flex: none;
  }
  #who { min-width: 0; color: #efeff1; }
  #name { font-size: 19px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #name .at { color: var(--purple); }
  #game { font-size: 13px; color: #adadb8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #game b { color: #d6c7ff; font-weight: 600; }

  /* tiny status pill — only visible while there's a problem */
  #status {
    position: fixed;
    top: 8px; left: 8px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    color: #efeff1;
    background: rgba(20, 20, 24, 0.85);
    border: 1px solid #3a3a40;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #status.visible { opacity: 1; }
  #status.bad { border-color: #e91916; }
</style>
</head>
<body>
  <div id="stage">
    <div id="card">
      <div id="frame">
        <video id="video" playsinline></video>
        <div id="banner">
          <img id="avatar" alt="">
          <div id="who">
            <div id="name"><span class="at">@</span><span id="nameText"></span></div>
            <div id="game">was last playing <b id="gameText"></b></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="status"></div>

<script src="config.js" onerror="window.SOCLIP_NO_CONFIG = true"></script>
<script>
(function () {
  "use strict";

  // config.js sets window.SOCLIP. If the file loaded but didn't set it,
  // someone's edit broke it (missing quote/comma) — warn instead of
  // silently running with defaults.
  var cfg = window.SOCLIP || {};
  var cfgBroken = !window.SOCLIP && !window.SOCLIP_NO_CONFIG;

  // URL query options override config.js, which overrides the defaults.
  var qs = new URLSearchParams(location.search);
  function opt(name, fallback) {
    var v = qs.get(name);
    if (v !== null && v !== "") return v;
    if (cfg[name] !== undefined && cfg[name] !== null && cfg[name] !== "") return String(cfg[name]);
    return fallback;
  }

  var HOST     = opt("host", "127.0.0.1");
  var PORT     = opt("port", "8080");
  var PASSWORD = opt("password", "");
  var VOLUME   = Math.min(1, Math.max(0, parseFloat(opt("volume", "0.85"))));
  var WIDTH    = Math.min(1280, Math.max(240, parseInt(opt("width", "480"), 10)));
  var POSITION = opt("position", "center");
  var TEST     = opt("test", "") === "1" || opt("test", "") === "true";

  document.documentElement.style.setProperty("--card-w", WIDTH + "px");
  if (POSITION !== "center") document.getElementById("stage").className = POSITION;

  var card     = document.getElementById("card");
  var video    = document.getElementById("video");
  var avatar   = document.getElementById("avatar");
  var nameText = document.getElementById("nameText");
  var gameText = document.getElementById("gameText");
  var statusEl = document.getElementById("status");

  function status(text, bad) {
    // A broken config.js means we're running on defaults the user didn't
    // choose — keep saying so, even when the connection itself is fine.
    if (!text && cfgBroken) {
      text = "config.js has an error in it, so your settings are being ignored — check your last edit (missing quote or comma?)";
      bad = true;
    }
    if (!text) { statusEl.className = ""; return; }
    statusEl.textContent = "SoClip: " + text;
    statusEl.className = "visible" + (bad ? " bad" : "");
  }

  // ---------- playback queue ----------
  var queue = [];
  var playing = false;
  var safetyTimer = null;

  function enqueue(clip) {
    queue.push(clip);
    if (!playing) playNext();
  }

  function playNext() {
    var clip = queue.shift();
    if (!clip) { playing = false; return; }
    playing = true;

    nameText.textContent = clip.displayName || clip.login || "?";
    gameText.textContent = clip.game || "something cool";
    avatar.src = clip.avatarUrl || "";
    video.volume = VOLUME;

    if (clip._testStream) {
      video.srcObject = clip._testStream;
    } else {
      video.srcObject = null;
      video.src = clip.videoUrl;
    }

    card.classList.add("show");
    video.play().catch(function (e) {
      console.error("SoClip: play() failed", e);
      finishClip();
    });

    // If the video stalls or 'ended' never fires, bail out anyway.
    var limit = ((clip.duration && clip.duration > 0 ? clip.duration : 30) + 8) * 1000;
    clearTimeout(safetyTimer);
    safetyTimer = setTimeout(finishClip, limit);
  }

  function finishClip() {
    clearTimeout(safetyTimer);
    card.classList.remove("show");
    setTimeout(function () {
      video.pause();
      video.removeAttribute("src");
      video.srcObject = null;
      video.load();
      playNext();
    }, 500); // wait for the fade-out
  }

  video.addEventListener("ended", finishClip);
  video.addEventListener("error", function () {
    console.error("SoClip: video error", video.error);
    finishClip();
  });

  // ---------- Streamer.bot WebSocket ----------
  var ws = null;
  var retryMs = 1000;

  function connect() {
    status("connecting…");
    try {
      ws = new WebSocket("ws://" + HOST + ":" + PORT + "/");
    } catch (e) {
      scheduleRetry();
      return;
    }

    ws.onopen = function () {
      retryMs = 1000;
      status(""); // assume open server; auth hello (if any) handled in onmessage
    };

    ws.onmessage = function (ev) {
      var msg;
      try { msg = JSON.parse(ev.data); } catch (e) { return; }

      // Streamer.bot sends a Hello on connect; it carries an authentication
      // challenge when "Require authentication" is enabled on the server.
      if (msg.authentication && msg.authentication.challenge) {
        if (!PASSWORD) {
          status("server wants a password — put it in config.js (password: \"...\"), or untick Authentication on the WebSocket server", true);
          return;
        }
        authenticate(msg.authentication.salt, msg.authentication.challenge);
        return;
      }
      if (msg.request === "Hello") { subscribe(); return; } // open server, no auth needed
      if (msg.id === "soclip-auth") {
        if (msg.status === "ok") { status(""); subscribe(); }
        else status("wrong WebSocket password", true);
        return;
      }

      // Streamer.bot 1.x delivers WebsocketBroadcastJson payloads only to
      // clients subscribed to General/Custom, wrapped in an event envelope.
      // Older versions hand the raw payload to every client — accept both.
      var payload = msg;
      if (msg.event && msg.event.source === "General" && msg.event.type === "Custom" && msg.data) {
        payload = msg.data;
      }
      if (payload.type === "soclip.play" && payload.clip && payload.clip.videoUrl) {
        enqueue(payload.clip);
      }
    };

    // Without this subscription, Streamer.bot 1.x never sends us broadcasts.
    function subscribe() {
      ws.send(JSON.stringify({ request: "Subscribe", id: "soclip-sub", events: { General: ["Custom"] } }));
    }

    ws.onclose = function (ev) {
      // Streamer.bot closes with 4009 when authentication fails.
      if (ev && ev.code === 4009) {
        status(PASSWORD
          ? "wrong WebSocket password"
          : "server wants a password — put it in config.js (password: \"...\"), or untick Authentication on the WebSocket server", true);
      } else if (ev && ev.code >= 4000 && ev.reason) {
        // other Streamer.bot application closes carry a human-readable
        // reason (e.g. 4006 "Did not receive Authenticate request within 30s")
        status("Streamer.bot closed the connection: " + ev.reason, true);
      } else {
        status("can't reach Streamer.bot — is the WebSocket Server running? (Servers/Clients → WebSocket Server)", true);
      }
      scheduleRetry();
    };
    ws.onerror = function () { /* onclose follows and handles it */ };
  }

  function scheduleRetry() {
    setTimeout(connect, retryMs);
    retryMs = Math.min(retryMs * 2, 10000);
  }

  function bytesToB64(arr) {
    var bin = "";
    for (var i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
    return btoa(bin);
  }

  // SHA-256 in plain JS. OBS serves Local-file browser sources from an
  // insecure origin where crypto.subtle does not exist, so we can't rely
  // on WebCrypto being there (that's also why this is feature-detected
  // in sha256b64 below, not assumed).
  var SHA_K = [
    0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
    0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
    0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
    0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
    0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
    0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
    0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
    0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
  ];

  function sha256js(bytes) {
    function rotr(x, n) { return (x >>> n) | (x << (32 - n)); }
    var H = [0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19];
    var len = bytes.length;
    var padded = new Uint8Array((((len + 8) >> 6) << 6) + 64);
    padded.set(bytes);
    padded[len] = 0x80;
    var dv = new DataView(padded.buffer);
    dv.setUint32(padded.length - 8, Math.floor((len * 8) / 0x100000000));
    dv.setUint32(padded.length - 4, (len * 8) >>> 0);
    var w = new Array(64);
    for (var off = 0; off < padded.length; off += 64) {
      var i;
      for (i = 0; i < 16; i++) w[i] = dv.getUint32(off + i * 4);
      for (i = 16; i < 64; i++) {
        var s0 = rotr(w[i - 15], 7) ^ rotr(w[i - 15], 18) ^ (w[i - 15] >>> 3);
        var s1 = rotr(w[i - 2], 17) ^ rotr(w[i - 2], 19) ^ (w[i - 2] >>> 10);
        w[i] = (w[i - 16] + s0 + w[i - 7] + s1) >>> 0;
      }
      var a = H[0], b = H[1], c = H[2], d = H[3], e = H[4], f = H[5], g = H[6], h = H[7];
      for (i = 0; i < 64; i++) {
        var S1 = rotr(e, 6) ^ rotr(e, 11) ^ rotr(e, 25);
        var ch = (e & f) ^ (~e & g);
        var t1 = (h + S1 + ch + SHA_K[i] + w[i]) >>> 0;
        var S0 = rotr(a, 2) ^ rotr(a, 13) ^ rotr(a, 22);
        var maj = (a & b) ^ (a & c) ^ (b & c);
        var t2 = (S0 + maj) >>> 0;
        h = g; g = f; f = e; e = (d + t1) >>> 0; d = c; c = b; b = a; a = (t1 + t2) >>> 0;
      }
      H[0] = (H[0] + a) >>> 0; H[1] = (H[1] + b) >>> 0; H[2] = (H[2] + c) >>> 0; H[3] = (H[3] + d) >>> 0;
      H[4] = (H[4] + e) >>> 0; H[5] = (H[5] + f) >>> 0; H[6] = (H[6] + g) >>> 0; H[7] = (H[7] + h) >>> 0;
    }
    var out = new Uint8Array(32);
    var odv = new DataView(out.buffer);
    for (var j = 0; j < 8; j++) odv.setUint32(j * 4, H[j]);
    return out;
  }

  function sha256b64(str) {
    var bytes = new TextEncoder().encode(str);
    if (window.crypto && window.crypto.subtle && window.crypto.subtle.digest) {
      return crypto.subtle.digest("SHA-256", bytes).then(function (buf) {
        return bytesToB64(new Uint8Array(buf));
      });
    }
    return Promise.resolve(bytesToB64(sha256js(bytes)));
  }

  function authenticate(salt, challenge) {
    try {
      sha256b64(PASSWORD + salt).then(function (secret) {
        return sha256b64(secret + challenge);
      }).then(function (auth) {
        ws.send(JSON.stringify({ request: "Authenticate", id: "soclip-auth", authentication: auth }));
      }).catch(fail);
    } catch (e) { fail(e); } // a synchronous throw must hit the badge too
    function fail(e) {
      console.error("SoClip: auth failed", e);
      status("authentication error — see console", true);
    }
  }

  connect();

  // ---------- test mode ----------
  function makeTestClip() {
    var canvas = document.createElement("canvas");
    canvas.width = 1280; canvas.height = 720;
    var ctx = canvas.getContext("2d");
    var t0 = performance.now();
    (function draw(now) {
      var t = (now - t0) / 1000;
      var g = ctx.createLinearGradient(0, 0, 1280, 720);
      g.addColorStop(0, "#1f1530");
      g.addColorStop(1, "#0e0e10");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, 1280, 720);
      ctx.fillStyle = "#9146ff";
      ctx.beginPath();
      ctx.arc(640 + Math.cos(t * 1.5) * 220, 360 + Math.sin(t * 2.1) * 120, 36, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#efeff1";
      ctx.font = "bold 64px 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("SoClip test clip", 640, 340);
      ctx.font = "28px 'Segoe UI', sans-serif";
      ctx.fillStyle = "#adadb8";
      ctx.fillText("a real clip plays here — size & position me, then turn test off in config.js", 640, 400);
      requestAnimationFrame(draw);
    })(t0);
    return {
      displayName: "SomeStreamer",
      login: "somestreamer",
      game: "Just Chatting",
      avatarUrl: "https://static-cdn.jtvnw.net/jtv_user_pictures/xarth/404_user_300x300.png",
      duration: 6,
      videoUrl: "test",
      _testStream: canvas.captureStream(30)
    };
  }

  if (TEST) {
    var fire = function () { enqueue(makeTestClip()); };
    setTimeout(fire, 800);
    setInterval(function () { if (!playing && queue.length === 0) fire(); }, 12000);
  }
})();
</script>
</body>
</html>
